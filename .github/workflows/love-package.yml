name: Package .love

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    name: Build thousand.love
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .love archive
        run: make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thousand-love
          path: thousand.love
          if-no-files-found: error
          retention-days: 30
